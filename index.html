<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 RAG 문서 업로더 & 챗봇</title>
    <!-- Google Fonts & Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
        }

        /* Header Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.5);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-area i {
            font-size: 1.75rem;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        .logo-area h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Layout Grid */
        .container {
            display: grid;
            grid-template-columns: 380px 1fr;
            flex: 1;
            height: calc(100vh - 65px);
            overflow: hidden;
        }

        /* Sidebar (Left) */
        .sidebar {
            border-right: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: rgba(17, 24, 39, 0.3);
            backdrop-filter: blur(20px);
            overflow-y: auto;
        }

        .sidebar-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-primary);
        }

        /* File Upload Styling */
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 0.75rem;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.01);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent-color);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area i {
            font-size: 2rem;
            color: var(--text-secondary);
            transition: color 0.2s ease;
        }

        .upload-area:hover i {
            color: var(--accent-color);
        }

        .upload-area p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .upload-area span {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent-color);
        }

        #file-input {
            display: none;
        }

        /* Status & OCR text preview */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
        }

        .status-badge.success {
            color: var(--success-color);
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .status-badge.loading {
            color: var(--accent-color);
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.2);
        }

        .ocr-preview-container {
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 0.75rem;
            font-family: monospace;
            color: var(--text-secondary);
            white-space: pre-wrap;
            border: 1px solid var(--border-color);
        }

        /* Main Chat Area (Right) */
        .chat-area {
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
            overflow: hidden;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .avatar {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .message.user .avatar {
            background: var(--accent-color);
            color: white;
            border: none;
        }

        .message.assistant .avatar {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            border: none;
        }

        .bubble {
            padding: 0.85rem 1.25rem;
            border-radius: 1.25rem;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.user .bubble {
            background: var(--accent-color);
            color: white;
            border-top-right-radius: 0.25rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .message.assistant .bubble {
            background: var(--panel-bg);
            color: var(--text-primary);
            border-top-left-radius: 0.25rem;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        /* Suggestions Area */
        .suggestions {
            padding: 0.5rem 2rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .suggestion-chip:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--text-primary);
            border-color: var(--accent-color);
        }

        /* Input Area */
        .input-container {
            padding: 1.5rem 2rem 2rem;
            background: transparent;
        }

        .input-wrapper {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            padding: 0.5rem 0.75rem 0.5rem 1.25rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: border-color 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            padding: 0.5rem 0;
            resize: none;
            max-height: 100px;
            min-height: 24px;
        }

        #chat-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        .send-btn:disabled {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo-area">
            <i class="fa-solid fa-file-invoice"></i>
            <h1>RAG OCR Chatbot</h1>
        </div>
    </header>

    <!-- App Body -->
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Upload Card -->
            <div class="sidebar-card">
                <h3><i class="fa-solid fa-cloud-arrow-up"></i> 문서 업로드</h3>
                <div class="upload-area" id="drop-zone">
                    <i class="fa-solid fa-file-pdf"></i>
                    <p>분석할 문서를 드래그 앤 드롭 하거나 <span>파일 선택</span>을 클릭하세요.</p>
                    <input type="file" id="file-input" accept=".pdf, .jpg, .jpeg, .png, .bmp, .tiff, .docx, .xlsx, .pptx, .html">
                </div>
                
                <!-- OCR Status -->
                <div class="status-badge" id="ocr-status-badge">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>대기 중 (문서를 업로드하세요)</span>
                </div>
            </div>

            <!-- OCR Text Preview Card -->
            <div class="sidebar-card" id="preview-card" style="display: none;">
                <h3><i class="fa-solid fa-file-text"></i> 추출된 텍스트 원본</h3>
                <div class="ocr-preview-container" id="ocr-text-preview"></div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <!-- Messages -->
            <div class="messages-container" id="messages-container">
                <div class="message assistant">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="bubble">안녕하세요! 위에 원하는 문서를 업로드해 주시면, 제가 내용을 완벽하게 학습하여 팩트 기반으로 답변해 드립니다.</div>
                </div>
            </div>

            <!-- Suggestion Chips -->
            <div class="suggestions" id="suggestions-area" style="display: none;">
                <div class="suggestion-chip" onclick="askSuggestion(this.innerText)">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> 📝 문서 핵심 내용을 3줄로 요약해 줘
                </div>
                <div class="suggestion-chip" onclick="askSuggestion(this.innerText)">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> 🎯 주요 업무와 핵심 지원 자격 요건은 뭐야?
                </div>
                <div class="suggestion-chip" onclick="askSuggestion(this.innerText)">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> 🎁 우대사항 및 복지 혜택 같은 특이사항이 있어?
                </div>
            </div>

            <!-- Input Container -->
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" placeholder="문서에 관해 물어보세요..." disabled>
                    <button class="send-btn" id="send-btn" disabled>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const ocrStatusBadge = document.getElementById('ocr-status-badge');
        const ocrTextPreview = document.getElementById('ocr-text-preview');
        const previewCard = document.getElementById('preview-card');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesContainer = document.getElementById('messages-container');
        const suggestionsArea = document.getElementById('suggestions-area');

        // Global App State
        let documentText = "";
        let chatHistory = [];

        // File Uploader Handling
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // OCR Core Process (Call secure Cloudflare local proxy function)
        const handleFile = async (file) => {
            // Set loading UI
            ocrStatusBadge.className = "status-badge loading";
            ocrStatusBadge.innerHTML = `<i class="fa-solid fa-circle-notch spinner"></i> <span>OCR 분석 중...</span>`;
            
            try {
                // Read File Buffer
                const fileBytes = await file.arrayBuffer();

                // 백엔드 프록시 API 호출 (실제 API 키는 Cloudflare 서버 사이드에 은닉됨)
                const ocrResponse = await fetch("/api/ocr", {
                    method: 'POST',
                    body: fileBytes
                });

                const ocrResult = await ocrResponse.json();

                if (!ocrResponse.ok) {
                    throw new Error(ocrResult.error || `OCR 분석 실패 (코드: ${ocrResponse.status})`);
                }

                documentText = ocrResult.content || "";
                
                // Update UI
                ocrStatusBadge.className = "status-badge success";
                ocrStatusBadge.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>문서 분석 완료! (${documentText.length} 자)</span>`;
                
                ocrTextPreview.innerText = documentText;
                previewCard.style.display = "flex";
                suggestionsArea.style.display = "flex";
                
                chatInput.disabled = false;
                sendBtn.disabled = false;
                
                addMessage("assistant", "문서 분석이 끝났습니다! 궁금한 내용을 자유롭게 질문해 주세요.");

            } catch (err) {
                console.error(err);
                ocrStatusBadge.className = "status-badge";
                ocrStatusBadge.innerHTML = `<i class="fa-solid fa-circle-xmark" style="color:var(--danger-color)"></i> <span>에러: ${err.message}</span>`;
                alert(`오류 발생: ${err.message}`);
            }
        };

        // Chat UI helpers
        const addMessage = (role, text) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = role === 'user' ? '<i class="fa-solid fa-user"></i>' : '<i class="fa-solid fa-robot"></i>';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = text;
            
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        };

        // Action Trigger for secure Cloudflare AI completions proxy
        const askQuestion = async (userQuery) => {
            if (!documentText) {
                alert("먼저 분석할 문서를 올려주세요.");
                return;
            }

            // UI 갱신 및 히스토리 보관
            addMessage("user", userQuery);
            chatHistory.push({ role: "user", content: userQuery });
            
            chatInput.value = "";
            chatInput.disabled = true;
            sendBtn.disabled = true;

            // 로딩 대기 메시지
            const loadingMsgDiv = document.createElement('div');
            loadingMsgDiv.className = 'message assistant';
            loadingMsgDiv.innerHTML = `
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="bubble"><i class="fa-solid fa-circle-notch spinner"></i> 답변을 생각하는 중...</div>
            `;
            messagesContainer.appendChild(loadingMsgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                // RAG System Prompt 구성
                const systemPrompt = `당신은 제공된 문서를 바탕으로 사용자의 질문에 답하는 비서입니다.
아래 [참조 문서 내용]을 바탕으로 사용자의 질문에 친절하고 상세하게 답변해 주세요.

[답변 규칙]
1. 반드시 한국어로 답변해 주세요.
2. 문서에 명시되지 않은 정보는 억지로 지어내지 말고, 솔직하게 "제공된 문서 내용에서는 해당 정보를 찾을 수 없습니다."라고 답변해 주세요.
3. 문서의 텍스트에 기반하여 팩트 위주로 대답해 주세요.

[참조 문서 내용]
${documentText}`;

                // 대화 데이터 배열 만들기 (최근 6개 히스토리만 결합)
                const messagesPayload = [
                    { role: "system", content: systemPrompt }
                ];
                
                const lastHistory = chatHistory.slice(-6);
                lastHistory.forEach(h => messagesPayload.push(h));

                // 백엔드 프록시 API 호출 (실제 API 키는 Cloudflare 서버 사이드에 은닉됨)
                const response = await fetch("/api/chat", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: messagesPayload
                    })
                });

                const resData = await response.json();

                if (!response.ok) {
                    throw new Error(resData.error || `AI 응답 획득 실패 (코드: ${response.status})`);
                }

                const aiAnswer = resData.choices[0].message.content;

                // Remove loading bubble
                messagesContainer.removeChild(loadingMsgDiv);
                
                // Add real answer
                addMessage("assistant", aiAnswer);
                chatHistory.push({ role: "assistant", content: aiAnswer });

            } catch (err) {
                console.error(err);
                messagesContainer.removeChild(loadingMsgDiv);
                addMessage("assistant", `오류가 발생했습니다: ${err.message}`);
            } finally {
                chatInput.disabled = false;
                sendBtn.disabled = false;
                chatInput.focus();
            }
        };

        // Suggested Question callback
        window.askSuggestion = (fullText) => {
            const cleanText = fullText.replace(/^[^\w가-힣]+/, "").trim();
            askQuestion(cleanText);
        };

        // User Chat submit event listeners
        sendBtn.addEventListener('click', () => {
            const query = chatInput.value.trim();
            if (query) askQuestion(query);
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const query = chatInput.value.trim();
                if (query) askQuestion(query);
            }
        });
    </script>
</body>
</html>
