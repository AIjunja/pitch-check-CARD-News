<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Card 07 - CTA</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cta-badge-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .store-badge {
      background: #000;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      font-size: 20px;
      font-family: 'GmarketSansMedium', sans-serif;
    }
    .store-badge span.store-name {
      font-family: 'GmarketSansBold', sans-serif;
      font-size: 24px;
      color: var(--accent-mint);
    }
  </style>
</head>
<body>
  <div class="card-container">
    <div class="category-chip">🎁 DOWNLOAD NOW</div>
    
    <div class="cta-box">
      <div style="width: 100px; height: 100px; border-radius: 25px; background: linear-gradient(135deg, var(--accent-mint), #00938a); display: flex; justify-content: center; align-items: center; font-size: 55px; font-weight: bold; color: #060913; margin: 0 auto 20px auto;">P</div>
      <h2 class="headline" style="font-size: 72px; margin-bottom: 10px;">PITCHCHECK</h2>
      <p class="body-copy" style="color: var(--text-primary); font-size: 38px; font-family: 'GmarketSansBold', sans-serif;">
        "총무가 편해야 팀이 오래갑니다"
      </p>
      
      <div class="cta-badge-container">
        <div class="store-badge">
          <div style="font-size: 14px; text-align: left; color: #9ca3af;">GET IT ON <br><span class="store-name">Google Play</span></div>
        </div>
        <div class="store-badge">
          <div style="font-size: 14px; text-align: left; color: #9ca3af;">Download on the <br><span class="store-name">App Store</span></div>
        </div>
      </div>
    </div>
    
    <div>
      <h2 class="headline" style="font-size: 64px; text-align: center; line-height: 1.3; margin-bottom: 0;">
        👉 댓글로 <span class="highlight-mint">[피치체크]</span>를 남겨주시면<br>
        <span class="highlight-yellow">즉시 다운로드 링크</span>를 보내드립니다!
      </h2>
    </div>

    <div class="card-footer">
      <span>07 / 07</span>
      <span class="footer-brand">PITCHCHECK</span>
    </div>
  </div>
</body>
</html>
