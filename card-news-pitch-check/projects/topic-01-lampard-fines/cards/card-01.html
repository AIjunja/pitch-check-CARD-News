<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Card 01 - Cover</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Cover Background Image -->
  <img class="cover-bg" src="../../../assets/images/topic-01/cover.jpg" alt="Frank Lampard">
  <div class="cover-overlay"></div>

  <div class="card-container">
    <div class="category-chip">⚽ SOCCER NEWS</div>
    
    <div class="cover-content">
      <h1 class="headline" style="font-size: 88px;">
        "지각하면 <span class="highlight-pink">3,000만 원</span>?!"<br>
        EPL 구단의 미친 벌금표
      </h1>
      
      <div class="card-footer" style="border-top: none; padding-top: 10px; margin-top: 20px;">
        <span>Source · EPL Chelsea FC</span>
        <span class="footer-brand">PITCHCHECK</span>
      </div>
    </div>
  </div>
</body>
</html>
