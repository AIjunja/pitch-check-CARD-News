<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Card 04 - Bridge</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .empathy-bubble-wrapper {
      position: absolute;
      top: 150px;
      right: 100px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 10;
    }
    .chat-bubble {
      background: #111827;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 12px 24px;
      font-size: 24px;
      color: #f3f4f6;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
    }
    .chat-bubble.left {
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border-left: 4px solid var(--accent-pink);
    }
    .chat-bubble.right {
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      border-right: 4px solid var(--accent-pink);
    }
  </style>
</head>
<body>
  <div class="card-container">
    <div class="category-chip pink">🤦‍♂️ AMATEUR REALITY</div>
    
    <div class="media-container" style="height: 660px; position: relative;">
      <img class="media-image" src="../../../assets/images/topic-01/detail_03.jpg" alt="Amateur Reality">
      
      <!-- Minimal overlay bubbles -->
      <div class="empathy-bubble-wrapper">
        <div class="chat-bubble left">"거의 다 옴! (이제 씻는 중)"</div>
        <div class="chat-bubble right">"오늘 급한 일이 생겨서 불참합니다"</div>
      </div>
    </div>
    
    <div>
      <h2 class="headline" style="font-size: 72px; margin-bottom: 10px;">
        하지만 우리 <span class="highlight-pink">조기축구/풋살 팀은?</span>
      </h2>
      <p class="body-copy">
        상습 지각과 무단 노쇼. 매주 카톡방 투표에 속타는 총무님들의 서러움.
      </p>
    </div>

    <div class="card-footer">
      <span>04 / 07</span>
      <span class="footer-brand">PITCHCHECK</span>
    </div>
  </div>
</body>
</html>
